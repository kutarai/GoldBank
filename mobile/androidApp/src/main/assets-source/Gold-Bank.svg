<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gold gradient for the main icon -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#FDB931;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFDF00;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#FDB931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>

    <!-- Darker gold gradient for depth -->
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>

    <!-- Gold bar gradient (horizontal) -->
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE55C;stop-opacity:1" />
      <stop offset="15%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#FDB931;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="85%" style="stop-color:#FDB931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>

    <!-- Gold bar top face highlight -->
    <linearGradient id="barTopHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.3" />
    </linearGradient>

    <!-- Glossy highlight -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:0.3" />
    </linearGradient>

    <!-- Subtle shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#8B6914" flood-opacity="0.4"/>
    </filter>

    <!-- Inner glow -->
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="2" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>

    <!-- Bar shadow -->
    <filter id="barShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer circle background -->
  <circle cx="256" cy="256" r="230" fill="#1a1a2e" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#goldGradient)" stroke-width="3" opacity="0.3"/>

  <!-- Main gold circle -->
  <circle cx="256" cy="256" r="195" fill="url(#goldGradient)" filter="url(#shadow)"/>

  <!-- Inner dark circle for contrast -->
  <circle cx="256" cy="256" r="170" fill="#1a1a2e"/>

  <!-- Subtle gold ring inside -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.4"/>

  <!-- Glossy overlay on the outer gold ring -->
  <circle cx="256" cy="256" r="195" fill="url(#gloss)" opacity="0.4"/>

  <!-- WiFi symbol - center dot -->
  <circle cx="256" cy="275" r="18" fill="url(#goldGradient)" filter="url(#innerGlow)"/>

  <!-- WiFi arc 1 (smallest, bottom) - tighter spacing -->
  <path d="M 205 240 Q 230 212 256 212 Q 282 212 307 240"
        fill="none" stroke="url(#goldGradient)" stroke-width="14" stroke-linecap="round"/>

  <!-- WiFi arc 2 (middle) - tighter spacing -->
  <path d="M 177 216 Q 214 175 256 175 Q 298 175 335 216"
        fill="none" stroke="url(#goldGradient)" stroke-width="14" stroke-linecap="round"/>

  <!-- WiFi arc 3 (largest, top) - tighter spacing -->
  <path d="M 149 195 Q 198 140 256 140 Q 314 140 363 195"
        fill="none" stroke="url(#goldGradient)" stroke-width="14" stroke-linecap="round"/>

  <!-- Gold Bar - doubled height -->
  <g filter="url(#barShadow)">
    <!-- Bar bottom face -->
    <rect x="170" y="340" width="172" height="20" rx="4" ry="4" fill="url(#goldDark)"/>

    <!-- Bar front face -->
    <rect x="170" y="305" width="172" height="64" rx="4" ry="4" fill="url(#barGradient)"/>

    <!-- Bar beveled edges (top) -->
    <rect x="170" y="305" width="172" height="10" rx="4" ry="4" fill="url(#barTopHighlight)" opacity="0.7"/>

    <!-- Bar beveled edges (bottom) -->
    <line x1="172" y1="358" x2="340" y2="358" stroke="#B8860B" stroke-width="2" opacity="0.6"/>

    <!-- Side ridges -->
    <line x1="172" y1="318" x2="172" y2="358" stroke="#FFF8DC" stroke-width="2" opacity="0.5"/>
    <line x1="340" y1="318" x2="340" y2="358" stroke="#8B6914" stroke-width="2" opacity="0.5"/>

    <!-- Center ridge line -->
    <line x1="172" y1="358" x2="340" y2="358" stroke="#B8860B" stroke-width="2" opacity="0.6"/>

    <!-- "GOLD" text on bar -->
    <text x="256" y="338" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="20" font-weight="800" letter-spacing="8" fill="#1a1a2e" opacity="0.9">GOLD</text>

    <!-- "BANK" text on bar -->
    <text x="256" y="357" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="16" font-weight="700" letter-spacing="8" fill="#1a1a2e" opacity="0.85">BANK</text>

    <!-- Shine highlight on bar -->
    <rect x="185" y="309" width="30" height="5" rx="2" fill="#FFF8DC" opacity="0.6"/>
  </g>
</svg>
