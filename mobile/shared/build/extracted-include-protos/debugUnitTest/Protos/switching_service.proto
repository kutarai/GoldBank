syntax = "proto3";
package unibank.v1.switching;
option csharp_namespace = "UniBank.Protos.Switching";

import "Protos/common.proto";
import "google/protobuf/timestamp.proto";

// Switching service - routes transactions through the national payment switch
service SwitchingService {
  rpc RouteOutboundTransaction(OutboundTransactionRequest) returns (OutboundTransactionResponse);
  rpc GetTransactionStatus(TransactionStatusRequest) returns (TransactionStatusResponse);
  rpc GetReconciliationReport(ReconciliationReportRequest) returns (ReconciliationReportResponse);
}

message OutboundTransactionRequest {
  string transaction_id = 1;
  string source_institution = 2;
  string destination_institution = 3;
  string debit_account = 4;
  string credit_account = 5;
  unibank.v1.common.Money amount = 6;
  string reference = 7;
  string message_type = 8;
  map<string, string> additional_data = 9;
}

message OutboundTransactionResponse {
  bool success = 1;
  string message = 2;
  string transaction_id = 3;
  string switch_reference = 4;
  string response_code = 5;
  string authorization_code = 6;
  google.protobuf.Timestamp processed_at = 7;
}

message TransactionStatusRequest {
  string transaction_id = 1;
}

message TransactionStatusResponse {
  bool success = 1;
  string transaction_id = 2;
  string status = 3;
  string response_code = 4;
  string message = 5;
  google.protobuf.Timestamp last_updated = 6;
}

message ReconciliationReportRequest {
  google.protobuf.Timestamp report_date = 1;
  string institution_id = 2;
}

message ReconciliationReportResponse {
  bool success = 1;
  string report_id = 2;
  google.protobuf.Timestamp report_date = 3;
  int32 total_sent = 4;
  int32 total_received = 5;
  int32 matched = 6;
  int32 discrepancies = 7;
  string net_settlement_amount = 8;
  string currency = 9;
  repeated ReconciliationDiscrepancy discrepancy_details = 10;
}

message ReconciliationDiscrepancy {
  string transaction_id = 1;
  string type = 2;
  string description = 3;
  string amount = 4;
  string currency = 5;
}
