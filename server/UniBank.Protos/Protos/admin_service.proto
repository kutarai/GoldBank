syntax = "proto3";
package unibank.v1.admin;
option csharp_namespace = "UniBank.Protos.Admin";

import "Protos/common.proto";
import "google/protobuf/timestamp.proto";

// Admin back-office service
service AdminService {
  rpc SearchCustomers(SearchCustomersRequest) returns (SearchCustomersResponse);
  rpc ManageAccount(ManageAccountRequest) returns (unibank.v1.common.StatusResponse);
  rpc ManageMerchant(ManageMerchantRequest) returns (unibank.v1.common.StatusResponse);
  rpc SearchTransactions(SearchTransactionsRequest) returns (stream AdminTransactionResponse);
  rpc ReviewKYC(ReviewKYCRequest) returns (unibank.v1.common.StatusResponse);
  rpc UpdateSystemConfig(UpdateSystemConfigRequest) returns (unibank.v1.common.StatusResponse);
  // STORY-061: Dispute management RPCs
  rpc CreateDispute(CreateDisputeRequest) returns (DisputeResponse);
  rpc ResolveDispute(ResolveDisputeRequest) returns (DisputeResponse);
  rpc ListDisputes(ListDisputesRequest) returns (ListDisputesResponse);
  // STORY-072: Fraud detection RPCs
  rpc GetFraudAlerts(GetFraudAlertsRequest) returns (GetFraudAlertsResponse);
  rpc ReviewFraudAlert(ReviewFraudAlertRequest) returns (unibank.v1.common.StatusResponse);
  // EPIC-019: User management RPCs
  rpc ListAdminUsers(ListAdminUsersRequest) returns (ListAdminUsersResponse);
  rpc CreateAdminUser(CreateAdminUserRequest) returns (AdminUserResponse);
  rpc UpdateAdminUser(UpdateAdminUserRequest) returns (AdminUserResponse);
  rpc DeactivateAdminUser(DeactivateAdminUserRequest) returns (unibank.v1.common.StatusResponse);
  // EPIC-019: Branch management RPCs
  rpc ListBranches(ListBranchesRequest) returns (ListBranchesResponse);
  rpc CreateBranch(CreateBranchRequest) returns (BranchResponse);
  rpc UpdateBranch(UpdateBranchRequest) returns (BranchResponse);
}

message SearchCustomersRequest {
  string query = 1;
  string status_filter = 2;
  unibank.v1.common.PaginationRequest pagination = 3;
}

message SearchCustomersResponse {
  repeated CustomerSummary customers = 1;
  unibank.v1.common.PaginationResponse pagination = 2;
}

message CustomerSummary {
  string account_id = 1;
  string phone_number = 2;
  string full_name = 3;
  string status = 4;
  int32 kyc_level = 5;
  unibank.v1.common.Money balance = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp last_login_at = 8;
}

message ManageAccountRequest {
  string account_id = 1;
  AccountAction action = 2;
  string reason = 3;
  string admin_id = 4;
}

enum AccountAction {
  ACCOUNT_ACTION_UNSPECIFIED = 0;
  ACCOUNT_ACTION_SUSPEND = 1;
  ACCOUNT_ACTION_ACTIVATE = 2;
  ACCOUNT_ACTION_CLOSE = 3;
  ACCOUNT_ACTION_FREEZE = 4;
  ACCOUNT_ACTION_UNFREEZE = 5;
  ACCOUNT_ACTION_RESET_PIN = 6;
}

message ManageMerchantRequest {
  string merchant_id = 1;
  MerchantAction action = 2;
  string reason = 3;
  string admin_id = 4;
}

enum MerchantAction {
  MERCHANT_ACTION_UNSPECIFIED = 0;
  MERCHANT_ACTION_APPROVE = 1;
  MERCHANT_ACTION_SUSPEND = 2;
  MERCHANT_ACTION_ACTIVATE = 3;
  MERCHANT_ACTION_CLOSE = 4;
}

message SearchTransactionsRequest {
  string account_id = 1;
  string merchant_id = 2;
  string reference = 3;
  string type_filter = 4;
  string status_filter = 5;
  unibank.v1.common.DateRange date_range = 6;
  unibank.v1.common.Money min_amount = 7;
  unibank.v1.common.Money max_amount = 8;
  unibank.v1.common.PaginationRequest pagination = 9;
}

message AdminTransactionResponse {
  string transaction_id = 1;
  string account_id = 2;
  string account_phone = 3;
  string type = 4;
  unibank.v1.common.Money amount = 5;
  unibank.v1.common.Money fee = 6;
  string status = 7;
  string reference = 8;
  string counterparty_info = 9;
  google.protobuf.Timestamp created_at = 10;
}

message ReviewKYCRequest {
  string document_id = 1;
  KYCDecision decision = 2;
  string notes = 3;
  string admin_id = 4;
}

enum KYCDecision {
  KYC_DECISION_UNSPECIFIED = 0;
  KYC_DECISION_APPROVE = 1;
  KYC_DECISION_REJECT = 2;
  KYC_DECISION_REQUEST_RESUBMIT = 3;
}

message UpdateSystemConfigRequest {
  string key = 1;
  string value_json = 2;
  string tenant_id = 3;
  string admin_id = 4;
}

// STORY-072: Fraud detection messages
message GetFraudAlertsRequest {
  string status_filter = 1;
  string severity_filter = 2;
  unibank.v1.common.DateRange date_range = 3;
  unibank.v1.common.PaginationRequest pagination = 4;
}

message GetFraudAlertsResponse {
  repeated FraudAlertSummary alerts = 1;
  unibank.v1.common.PaginationResponse pagination = 2;
}

message FraudAlertSummary {
  string alert_id = 1;
  string account_id = 2;
  string transaction_id = 3;
  string alert_type = 4;
  string severity = 5;
  string description = 6;
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
}

message ReviewFraudAlertRequest {
  string alert_id = 1;
  string admin_id = 2;
  string decision = 3;
  string notes = 4;
  bool suspend_account = 5;
}

// STORY-061: Dispute/chargeback messages
message CreateDisputeRequest {
  string transaction_id = 1;
  string account_id = 2;
  string type = 3;
  string description = 4;
  string admin_id = 5;
}

message ResolveDisputeRequest {
  string dispute_id = 1;
  string resolution = 2;
  string status = 3;
  unibank.v1.common.Money refund_amount = 4;
  string admin_id = 5;
}

message ListDisputesRequest {
  string account_id = 1;
  string status_filter = 2;
  unibank.v1.common.PaginationRequest pagination = 3;
}

message DisputeResponse {
  string dispute_id = 1;
  string transaction_id = 2;
  string account_id = 3;
  string type = 4;
  string description = 5;
  string status = 6;
  string resolution = 7;
  unibank.v1.common.Money refund_amount = 8;
  string admin_user_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp resolved_at = 11;
}

message ListDisputesResponse {
  repeated DisputeResponse disputes = 1;
  unibank.v1.common.PaginationResponse pagination = 2;
}

// EPIC-019: User management messages
message ListAdminUsersRequest {
  string tenant_id = 1;
  string role_filter = 2;
  bool active_only = 3;
  unibank.v1.common.PaginationRequest pagination = 4;
}

message ListAdminUsersResponse {
  repeated AdminUserResponse users = 1;
  unibank.v1.common.PaginationResponse pagination = 2;
}

message AdminUserResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  string full_name = 4;
  string role = 5;
  string branch_id = 6;
  string tenant_id = 7;
  bool is_active = 8;
}

message CreateAdminUserRequest {
  string username = 1;
  string email = 2;
  string full_name = 3;
  string role = 4;
  string branch_id = 5;
  string tenant_id = 6;
  string password = 7;
}

message UpdateAdminUserRequest {
  string id = 1;
  string email = 2;
  string full_name = 3;
  string role = 4;
  string branch_id = 5;
  bool is_active = 6;
}

message DeactivateAdminUserRequest {
  string id = 1;
  string admin_id = 2;
  string reason = 3;
}

// EPIC-019: Branch management messages
message ListBranchesRequest {
  string tenant_id = 1;
  bool active_only = 2;
  unibank.v1.common.PaginationRequest pagination = 3;
}

message ListBranchesResponse {
  repeated BranchResponse branches = 1;
  unibank.v1.common.PaginationResponse pagination = 2;
}

message BranchResponse {
  string id = 1;
  string name = 2;
  string code = 3;
  string address = 4;
  string city = 5;
  string phone = 6;
  string tenant_id = 7;
  bool is_active = 8;
}

message CreateBranchRequest {
  string name = 1;
  string code = 2;
  string address = 3;
  string city = 4;
  string phone = 5;
  string tenant_id = 6;
}

message UpdateBranchRequest {
  string id = 1;
  string name = 2;
  string address = 3;
  string city = 4;
  string phone = 5;
  bool is_active = 6;
}
