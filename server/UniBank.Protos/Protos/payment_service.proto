syntax = "proto3";
package unibank.v1.payments;
option csharp_namespace = "UniBank.Protos.Payments";

import "Protos/common.proto";
import "google/protobuf/timestamp.proto";

// Payment service - handles NFC and QR code payments
service PaymentService {
  rpc InitiateNFCPayment(NFCPaymentRequest) returns (PaymentResponse);
  rpc GenerateQRCode(QRCodeRequest) returns (QRCodeResponse);
  rpc ProcessQRPayment(QRPaymentRequest) returns (PaymentResponse);

  // STORY-022: NFC Payment Tokenization
  rpc TokenizeCard(TokenizeCardRequest) returns (TokenizeCardResponse);

  // STORY-024: PIN Entry for High-Value NFC
  rpc ConfirmNFCPayment(ConfirmNFCPaymentRequest) returns (PaymentResponse);

  // STORY-025, STORY-028: Payment Notifications Streaming
  rpc StreamPaymentNotifications(StreamNotificationsRequest) returns (stream PaymentNotification);
}

message NFCPaymentRequest {
  string account_id = 1;
  string merchant_id = 2;
  string terminal_id = 3;
  unibank.v1.common.Money amount = 4;
  string pin = 5;
  string nfc_data = 6;
}

message QRCodeRequest {
  string merchant_id = 1;
  string terminal_id = 2;
  unibank.v1.common.Money amount = 3;
  string description = 4;
  int32 ttl_seconds = 5;
}

message QRCodeResponse {
  bool success = 1;
  string qr_code_data = 2;
  string payment_reference = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message QRPaymentRequest {
  string account_id = 1;
  string qr_code_data = 2;
  string pin = 3;
}

message PaymentResponse {
  bool success = 1;
  string message = 2;
  string transaction_id = 3;
  string reference = 4;
  unibank.v1.common.Money amount = 5;
  unibank.v1.common.Money fee = 6;
  unibank.v1.common.Money new_balance = 7;
  google.protobuf.Timestamp completed_at = 8;
  bool requires_pin = 9;
  string status = 10;
  unibank.v1.common.Money tax = 11;
  unibank.v1.common.Money merchant_commission = 12;
}

// STORY-022: Tokenize card for NFC payments
message TokenizeCardRequest {
  string account_id = 1;
  string card_pan = 2;
  string device_id = 3;
}

message TokenizeCardResponse {
  bool success = 1;
  string token = 2;
  string token_reference = 3;
  string message = 4;
}

// STORY-024: Confirm high-value NFC payment with PIN
message ConfirmNFCPaymentRequest {
  string transaction_id = 1;
  string pin = 2;
}

// STORY-025, STORY-028: Payment notification streaming
message StreamNotificationsRequest {
  string account_id = 1;
}

message PaymentNotification {
  string notification_id = 1;
  string transaction_id = 2;
  string type = 3;
  string title = 4;
  string body = 5;
  unibank.v1.common.Money amount = 6;
  string status = 7;
  string reference = 8;
  google.protobuf.Timestamp created_at = 9;
}
