syntax = "proto3";
package goldbank.v1.transfers;
option csharp_namespace = "GoldBank.Protos.Transfers";

import "Protos/common.proto";
import "google/protobuf/timestamp.proto";

// Transfer service - handles P2P and cross-border transfers
service TransferService {
  rpc SendP2P(P2PTransferRequest) returns (TransferResponse);
  rpc SendCrossBorder(CrossBorderTransferRequest) returns (TransferResponse);
}

message P2PTransferRequest {
  string sender_account_id = 1;
  string recipient_phone = 2;
  goldbank.v1.common.Money amount = 3;
  string description = 4;
  string pin = 5;
}

message CrossBorderTransferRequest {
  string sender_account_id = 1;
  string recipient_phone = 2;
  string recipient_name = 3;
  string recipient_country = 4;
  goldbank.v1.common.Money send_amount = 5;
  string receive_currency = 6;
  string corridor_id = 7;
  string pin = 8;
}

message TransferResponse {
  bool success = 1;
  string message = 2;
  string transaction_id = 3;
  string reference = 4;
  goldbank.v1.common.Money amount_sent = 5;
  goldbank.v1.common.Money amount_received = 6;
  goldbank.v1.common.Money fee = 7;
  string exchange_rate = 8;
  goldbank.v1.common.Money new_balance = 9;
  TransferStatus status = 10;
  google.protobuf.Timestamp estimated_delivery = 11;
}

enum TransferStatus {
  TRANSFER_STATUS_UNSPECIFIED = 0;
  TRANSFER_STATUS_PENDING = 1;
  TRANSFER_STATUS_PROCESSING = 2;
  TRANSFER_STATUS_COMPLETED = 3;
  TRANSFER_STATUS_FAILED = 4;
}
