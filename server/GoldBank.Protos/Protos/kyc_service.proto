syntax = "proto3";
package goldbank.v1.kyc;
option csharp_namespace = "GoldBank.Protos.KYC";

import "google/protobuf/timestamp.proto";

// KYC service - handles document upload, selfie verification, and status (STORY-011, STORY-012)
service KycService {
  rpc UploadDocument(stream UploadDocumentRequest) returns (UploadDocumentResponse);
  rpc UploadSelfie(stream UploadSelfieRequest) returns (UploadSelfieResponse);
  rpc GetDocumentStatus(GetDocumentStatusRequest) returns (GetDocumentStatusResponse);
  rpc GetKycStatus(GetKycStatusRequest) returns (GetKycStatusResponse);
}

message UploadDocumentRequest {
  oneof payload {
    DocumentMetadata metadata = 1;
    bytes chunk = 2;
  }
}

message DocumentMetadata {
  string account_id = 1;
  string document_type = 2;     // "national_id", "passport", "drivers_license"
  string file_name = 3;
  string content_type = 4;      // "image/jpeg", "image/png", "application/pdf"
  int64 file_size = 5;
}

message UploadDocumentResponse {
  bool success = 1;
  string document_id = 2;
  string status = 3;
  string message = 4;
}

// --- Selfie Messages (STORY-012) ---
message UploadSelfieRequest {
  oneof payload {
    SelfieMetadata metadata = 1;
    bytes chunk = 2;
  }
}

message SelfieMetadata {
  string account_id = 1;
  string content_type = 2;       // "image/jpeg", "image/png"
  int64 file_size = 3;
  string liveness_token = 4;     // Token from liveness check (optional)
}

message UploadSelfieResponse {
  bool success = 1;
  string selfie_document_id = 2;
  double match_confidence = 3;   // 0.0 - 1.0
  string status = 4;             // "approved", "pending_review", "rejected"
  string message = 5;
}

// --- KYC Status Messages ---
message GetKycStatusRequest {
  string account_id = 1;
}

message GetKycStatusResponse {
  string account_id = 1;
  int32 kyc_level = 2;
  string overall_status = 3;     // "pending", "approved", "rejected"
  repeated KycDocumentSummary documents = 4;
}

message KycDocumentSummary {
  string document_id = 1;
  string document_type = 2;
  string status = 3;
  google.protobuf.Timestamp uploaded_at = 4;
}

message GetDocumentStatusRequest {
  string document_id = 1;
}

message GetDocumentStatusResponse {
  string document_id = 1;
  string document_type = 2;
  string status = 3;
  string message = 4;
  google.protobuf.Timestamp uploaded_at = 5;
  google.protobuf.Timestamp verified_at = 6;
}
