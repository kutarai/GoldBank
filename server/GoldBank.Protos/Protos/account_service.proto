syntax = "proto3";
package goldbank.v1.accounts;
option csharp_namespace = "GoldBank.Protos.Accounts";

import "Protos/common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

// Account management service - handles registration, profile, balance, and transactions
service AccountService {
  // Registration flow
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc VerifyOTP(VerifyOTPRequest) returns (VerifyOTPResponse);
  rpc CreatePIN(CreatePINRequest) returns (CreatePINResponse);

  // Profile management
  rpc GetProfile(GetProfileRequest) returns (ProfileResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (ProfileResponse);

  // Balance and transactions
  rpc GetBalance(GetBalanceRequest) returns (BalanceResponse);
  rpc GetTransactions(GetTransactionsRequest) returns (stream TransactionResponse);

  // Authentication (STORY-018)
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // Device transfer (STORY-014)
  rpc InitiateDeviceTransfer(InitiateDeviceTransferRequest) returns (InitiateDeviceTransferResponse);
  rpc CompleteDeviceTransfer(CompleteDeviceTransferRequest) returns (CompleteDeviceTransferResponse);

  // Customer disputes (EPIC-018)
  rpc ListMyDisputes(ListMyDisputesRequest) returns (ListMyDisputesResponse);
  rpc GetDisputeDetail(GetDisputeDetailRequest) returns (DisputeDetailResponse);

  // Customer fraud alerts (EPIC-018)
  rpc ListMyFraudAlerts(ListMyFraudAlertsRequest) returns (ListMyFraudAlertsResponse);
  rpc GetFraudAlertDetail(GetFraudAlertDetailRequest) returns (FraudAlertDetailResponse);
  rpc ConfirmTransaction(ConfirmTransactionRequest) returns (ConfirmTransactionResponse);
  rpc ReportFraud(ReportFraudRequest) returns (ReportFraudResponse);

  // Notifications (EPIC-018)
  rpc ListMyNotifications(ListMyNotificationsRequest) returns (ListMyNotificationsResponse);
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (MarkNotificationReadResponse);
}

// --- Registration Messages ---
message RegisterRequest {
  string phone_number = 1;
  string device_id = 2;
  string tenant_id = 3;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  string registration_id = 3;
  int32 otp_length = 4;
  int32 otp_ttl_seconds = 5;
}

message VerifyOTPRequest {
  string registration_id = 1;
  string otp = 2;
  string phone_number = 3;
}

message VerifyOTPResponse {
  bool success = 1;
  string message = 2;
  string account_id = 3;
  string temporary_token = 4;
}

message CreatePINRequest {
  string account_id = 1;
  string pin = 2;
  string pin_confirmation = 3;
}

message CreatePINResponse {
  bool success = 1;
  string message = 2;
  string auth_token = 3;
  string refresh_token = 4;
  string customer_id = 5;
}

// --- Profile Messages ---
message GetProfileRequest {
  string account_id = 1;
}

message UpdateProfileRequest {
  string account_id = 1;
  google.protobuf.StringValue first_name = 2;
  google.protobuf.StringValue last_name = 3;
  google.protobuf.StringValue email = 4;
  google.protobuf.StringValue date_of_birth = 5;
  google.protobuf.StringValue national_id = 6;
}

message ProfileResponse {
  string account_id = 1;
  string phone_number = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
  string date_of_birth = 6;
  string national_id = 7;
  AccountStatus status = 8;
  int32 kyc_level = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp last_login_at = 11;
  repeated AccountSummary accounts = 12;
}

message AccountSummary {
  string account_id = 1;
  string currency = 2;
  goldbank.v1.common.Money balance = 3;
  goldbank.v1.common.Money available_balance = 4;
  string card_pan_last4 = 5;
}

// --- Balance Messages ---
message GetBalanceRequest {
  string account_id = 1;
}

message BalanceResponse {
  string account_id = 1;
  goldbank.v1.common.Money balance = 2;
  goldbank.v1.common.Money available_balance = 3;
  goldbank.v1.common.Money daily_limit = 4;
  goldbank.v1.common.Money daily_used = 5;
}

// --- Transaction Messages ---
message GetTransactionsRequest {
  string account_id = 1;
  goldbank.v1.common.DateRange date_range = 2;
  TransactionType type_filter = 3;
  TransactionStatus status_filter = 4;
  goldbank.v1.common.PaginationRequest pagination = 5;
}

message TransactionResponse {
  string transaction_id = 1;
  TransactionType type = 2;
  goldbank.v1.common.Money amount = 3;
  goldbank.v1.common.Money fee = 4;
  TransactionStatus status = 5;
  string reference = 6;
  string description = 7;
  string counterparty_name = 8;
  string counterparty_phone = 9;
  goldbank.v1.common.Money balance_after = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp completed_at = 12;
}

// --- Enums ---
enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_PENDING_KYC = 1;
  ACCOUNT_STATUS_ACTIVE = 2;
  ACCOUNT_STATUS_SUSPENDED = 3;
  ACCOUNT_STATUS_CLOSED = 4;
  ACCOUNT_STATUS_FROZEN = 5;
}

enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  TRANSACTION_TYPE_CASH_IN = 1;
  TRANSACTION_TYPE_CASH_OUT = 2;
  TRANSACTION_TYPE_P2P_SEND = 3;
  TRANSACTION_TYPE_P2P_RECEIVE = 4;
  TRANSACTION_TYPE_PAYMENT_NFC = 5;
  TRANSACTION_TYPE_PAYMENT_QR = 6;
  TRANSACTION_TYPE_BILL_PAYMENT = 7;
  TRANSACTION_TYPE_TRANSFER_DOMESTIC = 8;
  TRANSACTION_TYPE_TRANSFER_CROSS_BORDER = 9;
  TRANSACTION_TYPE_FEE = 10;
  TRANSACTION_TYPE_REVERSAL = 11;
  TRANSACTION_TYPE_SETTLEMENT = 12;
}

enum TransactionStatus {
  TRANSACTION_STATUS_UNSPECIFIED = 0;
  TRANSACTION_STATUS_PENDING = 1;
  TRANSACTION_STATUS_PROCESSING = 2;
  TRANSACTION_STATUS_COMPLETED = 3;
  TRANSACTION_STATUS_FAILED = 4;
  TRANSACTION_STATUS_REVERSED = 5;
}

// --- Authentication Messages (STORY-018) ---
message AuthenticateRequest {
  string phone_number = 1;
  string pin = 2;
  string device_id = 3;
  string tenant_id = 4;
}

message AuthenticateResponse {
  bool success = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 access_token_expires_in = 4;
  int64 refresh_token_expires_in = 5;
  string account_id = 6;
  string message = 7;
  int32 remaining_attempts = 8;
  int64 lockout_remaining_seconds = 9;
  string customer_id = 10;
}

message RefreshTokenRequest {
  string refresh_token = 1;
  string device_id = 2;
}

message RefreshTokenResponse {
  bool success = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 access_token_expires_in = 4;
  int64 refresh_token_expires_in = 5;
  string message = 6;
}

message LogoutRequest {
  string account_id = 1;
  bool all_devices = 2;
}

message LogoutResponse {
  bool success = 1;
  string message = 2;
}

// --- Device Transfer Messages (STORY-014) ---
message InitiateDeviceTransferRequest {
  string phone_number = 1;
  string new_device_id = 2;
}

message InitiateDeviceTransferResponse {
  string transfer_reference = 1;
  string message = 2;
  int32 otp_expiry_seconds = 3;
}

message CompleteDeviceTransferRequest {
  string transfer_reference = 1;
  string otp = 2;
  string pin = 3;
  string new_device_id = 4;
}

message CompleteDeviceTransferResponse {
  bool success = 1;
  string access_token = 2;
  string refresh_token = 3;
  string message = 4;
}

// --- Customer Dispute Messages (EPIC-018) ---
message ListMyDisputesRequest {
  string account_id = 1;
  string status_filter = 2; // open, investigating, resolved, all
  goldbank.v1.common.PaginationRequest pagination = 3;
}

message ListMyDisputesResponse {
  repeated DisputeSummary disputes = 1;
  int32 total_count = 2;
}

message DisputeSummary {
  string dispute_id = 1;
  string reference = 2;
  string transaction_id = 3;
  string dispute_type = 4;
  string priority = 5;
  string status = 6;
  goldbank.v1.common.Money amount = 7;
  string summary = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp resolved_at = 10;
}

message GetDisputeDetailRequest {
  string account_id = 1;
  string dispute_id = 2;
}

message DisputeDetailResponse {
  string dispute_id = 1;
  string reference = 2;
  string transaction_id = 3;
  string dispute_type = 4;
  string priority = 5;
  string status = 6;
  string assigned_team = 7;
  goldbank.v1.common.Money amount = 8;
  string user_description = 9;
  string ai_summary = 10;
  string ai_recommended_action = 11;
  double classification_confidence = 12;
  string resolution_notes = 13;
  string expected_resolution = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp resolved_at = 16;
}

// --- Customer Fraud Alert Messages (EPIC-018) ---
message ListMyFraudAlertsRequest {
  string account_id = 1;
  goldbank.v1.common.PaginationRequest pagination = 2;
}

message ListMyFraudAlertsResponse {
  repeated FraudAlertSummary alerts = 1;
  int32 total_count = 2;
  int32 unread_count = 3;
}

message FraudAlertSummary {
  string alert_id = 1;
  string transaction_id = 2;
  string transaction_description = 3;
  goldbank.v1.common.Money amount = 4;
  double risk_score = 5;
  string risk_level = 6; // high, medium, low
  bool is_read = 7;
  google.protobuf.Timestamp created_at = 8;
}

message GetFraudAlertDetailRequest {
  string account_id = 1;
  string alert_id = 2;
}

message FraudAlertDetailResponse {
  string alert_id = 1;
  string transaction_id = 2;
  string transaction_description = 3;
  goldbank.v1.common.Money amount = 4;
  double risk_score = 5;
  string risk_level = 6;
  string ai_explanation = 7;
  repeated string triggered_rules = 8;
  string counterparty = 9;
  string location = 10;
  google.protobuf.Timestamp transaction_at = 11;
  google.protobuf.Timestamp alert_at = 12;
}

message ConfirmTransactionRequest {
  string account_id = 1;
  string alert_id = 2;
}

message ConfirmTransactionResponse {
  bool success = 1;
  string message = 2;
}

message ReportFraudRequest {
  string account_id = 1;
  string alert_id = 2;
  string description = 3;
}

message ReportFraudResponse {
  bool success = 1;
  string message = 2;
  string dispute_reference = 3; // auto-created dispute
}

// --- Notification Messages (EPIC-018) ---
message ListMyNotificationsRequest {
  string account_id = 1;
  goldbank.v1.common.PaginationRequest pagination = 2;
}

message ListMyNotificationsResponse {
  repeated NotificationItem notifications = 1;
  int32 unread_count = 2;
}

message NotificationItem {
  string notification_id = 1;
  string title = 2;
  string body = 3;
  string type = 4; // fraud_alert, dispute_update, kyc_update
  string reference_id = 5;
  bool is_read = 6;
  google.protobuf.Timestamp created_at = 7;
}

message MarkNotificationReadRequest {
  string account_id = 1;
  string notification_id = 2;
}

message MarkNotificationReadResponse {
  bool success = 1;
}
