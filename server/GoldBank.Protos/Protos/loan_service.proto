syntax = "proto3";
package goldbank.v1.loans;
option csharp_namespace = "GoldBank.Protos.Loans";

import "Protos/common.proto";
import "google/protobuf/timestamp.proto";

// Loan service - handles personal unsecured loan applications and management
service LoanService {
  rpc ApplyForLoan(ApplyForLoanRequest) returns (LoanApplicationResponse);
  rpc GetLoan(GetLoanRequest) returns (LoanDetailResponse);
  rpc ListLoans(ListLoansRequest) returns (ListLoansResponse);
  rpc GetLoanSchedule(GetLoanScheduleRequest) returns (LoanScheduleResponse);
}

message ApplyForLoanRequest {
  string account_id = 1;
  goldbank.v1.common.Money amount = 2;
  int32 tenure_months = 3;
  string purpose = 4;
  string pin = 5;
  // Optional: registered asset IDs the user is pledging as collateral.
  repeated string collateral_asset_ids = 6;
}

message LoanApplicationResponse {
  bool success = 1;
  string message = 2;
  string loan_id = 3;
  string reference = 4;
  LoanStatus status = 5;
  goldbank.v1.common.Money principal = 6;
  string interest_rate = 7;
  goldbank.v1.common.Money monthly_payment = 8;
  int32 tenure_months = 9;
  int32 credit_score = 10;
  goldbank.v1.common.Money new_balance = 11;
}

message GetLoanRequest {
  string loan_id = 1;
  string account_id = 2;
}

message LoanDetailResponse {
  string loan_id = 1;
  string reference = 2;
  LoanStatus status = 3;
  goldbank.v1.common.Money principal = 4;
  goldbank.v1.common.Money outstanding_balance = 5;
  string interest_rate = 6;
  int32 tenure_months = 7;
  goldbank.v1.common.Money monthly_payment = 8;
  string purpose = 9;
  int32 payments_made = 10;
  int32 total_payments = 11;
  google.protobuf.Timestamp next_payment_date = 12;
  google.protobuf.Timestamp created_at = 13;
  int32 credit_score = 14;
}

message ListLoansRequest {
  string account_id = 1;
  string status_filter = 2; // empty = all, "active", "completed"
}

message ListLoansResponse {
  repeated LoanSummary loans = 1;
}

message LoanSummary {
  string loan_id = 1;
  string reference = 2;
  LoanStatus status = 3;
  goldbank.v1.common.Money principal = 4;
  goldbank.v1.common.Money outstanding_balance = 5;
  goldbank.v1.common.Money monthly_payment = 6;
  int32 payments_made = 7;
  int32 total_payments = 8;
  google.protobuf.Timestamp created_at = 9;
}

message GetLoanScheduleRequest {
  string loan_id = 1;
  string account_id = 2;
}

message LoanScheduleResponse {
  repeated LoanScheduleEntry entries = 1;
}

message LoanScheduleEntry {
  int32 payment_number = 1;
  goldbank.v1.common.Money principal_amount = 2;
  goldbank.v1.common.Money interest_amount = 3;
  goldbank.v1.common.Money total_payment = 4;
  goldbank.v1.common.Money remaining_balance = 5;
  google.protobuf.Timestamp due_date = 6;
  bool is_paid = 7;
}

enum LoanStatus {
  LOAN_STATUS_UNSPECIFIED = 0;
  LOAN_STATUS_PENDING = 1;
  LOAN_STATUS_APPROVED = 2;
  LOAN_STATUS_REJECTED = 3;
  LOAN_STATUS_DISBURSED = 4;
  LOAN_STATUS_REPAYING = 5;
  LOAN_STATUS_PAID_OFF = 6;
  LOAN_STATUS_DEFAULTED = 7;
}
