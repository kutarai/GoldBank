version: "3.8"

services:
  # ── SynergySwitch ──
  switch:
    build:
      context: .
      dockerfile: Containerfile
    container_name: synergy-switch
    ports:
      - "3333:3333"   # gRPC
      - "8080:8080"   # Web dashboard + Prometheus /metrics
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__SwitchDb=Host=postgres;Port=5432;Database=synergy_switch;Username=switchadmin;Password=$witch#1
      - BankConnection__Host=196.1.1.1
      - BankConnection__Port=9100
      - BankConnection__OfflineMode=true
      - Kestrel__Endpoints__Grpc__Url=http://0.0.0.0:3333
      - Kestrel__Endpoints__Web__Url=http://0.0.0.0:8080
    depends_on:
      - postgres
    restart: unless-stopped

  # ── PostgreSQL ──
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: synergy-switch-db
    environment:
      POSTGRES_DB: synergy_switch
      POSTGRES_USER: switchadmin
      POSTGRES_PASSWORD: "$witch#1"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Prometheus ──
  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: synergy-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - promdata:/prometheus
    depends_on:
      - switch
    restart: unless-stopped

  # ── Grafana ──
  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: synergy-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=synergy
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  promdata:
  grafanadata:
