syntax = "proto3";

package synergy.terminal.v1;

option csharp_namespace = "SynergySwitch.Protos.Terminal";
option java_package = "com.synergy.pos.grpc.terminal";
option java_multiple_files = true;

// Terminal management service for POS device lifecycle.
service TerminalManagementService {
  // Register a terminal with the switch
  rpc Register(TerminalRegistrationRequest) returns (TerminalRegistrationResponse);

  // Periodic heartbeat from terminal
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Server-streaming: push configuration/key updates to terminal
  rpc StreamUpdates(TerminalIdentifier) returns (stream TerminalUpdate);
}

message TerminalIdentifier {
  string terminal_id = 1;
}

message TerminalRegistrationRequest {
  string terminal_id = 1;
  string merchant_id = 2;
  string serial_number = 3;
  string firmware_version = 4;
  string app_version = 5;
}

message TerminalRegistrationResponse {
  bool success = 1;
  string message = 2;
  TerminalConfiguration configuration = 3;
}

message TerminalConfiguration {
  string merchant_name = 1;
  string merchant_category_code = 2;
  string country_code = 3;
  string currency_code = 4;
  int64 contactless_floor_limit = 5;  // Minor units
  int64 cvm_required_limit = 6;       // Minor units
}

message HeartbeatRequest {
  string terminal_id = 1;
  string timestamp = 2;              // ISO 8601
  int32 battery_level = 3;           // 0-100
  int64 transaction_count = 4;       // Total since last restart
}

message HeartbeatResponse {
  bool acknowledged = 1;
  string server_time = 2;            // ISO 8601
}

message TerminalUpdate {
  UpdateType update_type = 1;
  bytes payload = 2;
  string timestamp = 3;              // ISO 8601
}

enum UpdateType {
  UPDATE_TYPE_UNSPECIFIED = 0;
  CONFIG = 1;     // Terminal configuration update
  AID = 2;        // AID table update
  CAPK = 3;       // CA Public Key update
  MESSAGE = 4;    // Display message
  KEY = 5;        // Encryption key update
}
